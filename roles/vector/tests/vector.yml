data_dir: ./data

sources:
  nginx_logs:
    type: file
    include:
      - ./tools.log

transforms:
  nginx_logs_data:
    inputs:
      - nginx_logs
    type: remap
    source: |
      .parsed = parse_nginx_log!(.message, "combined")

sinks:
  out:
    inputs:
      - nginx_logs_data
    type: console
    encoding:
      codec: json
  s3:
    inputs:
      - nginx_logs_data
    type: aws_s3
    bucket: cam-logs-test
    region: us-east-1
    key_prefix: "nginx-logs/dev.gvl.org.au/%Y-%m-%d"
    compression: gzip
    endpoint: https://object-store.rc.nectar.org.au
    auth:
      access_key_id: "$S3_ACCESS_KEY"
      secret_access_key: "$S3_SECRET_KEY"
    encoding:
      codec: json
    framing:
      method: newline_delimited
